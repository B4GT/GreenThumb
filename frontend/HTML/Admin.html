<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Add Product</title>
</head>

<style>
  form {
    margin-bottom: 50px;
  }
</style>

<body>
  <form id = "searchForm">
    <label for="query">Search for Product:</label>
    <input type="text" id="query" name="query"><br>
    <button type="submit">Search</button>
    <p>This will search by both product name and keywords</p>       
  </form>

  <div id="searchResults"></div>

  <form id="productForm">
    <p>The product selected from your search results will have its data written below.</p>
    <p>Edit the fields and save to edit products. To add a new product, enter a new product name.</p>

    <input type="hidden" id="productId" name="productId">

    <div class="form-group">
      <label for="name">Product Name:</label>
      <input type="text" id="name" name="name" required>
    </div>

    <div class="form-group">
      <label for="description">Description:</label><br>
      <textarea id="description" name="description"></textarea>
    </div>

    <div class="form-group">
      <label for="imageInput">Image Links:</label>
      <input type="text" id="imageInput" name="imageInput" placeholder="Paste image URLs here, seperated by columns">
    </div>

    <div id="imagePreviewSection">
      <p>Image preview:</p>
      <div id="imagePreview"></div>
    </div>

    <div class="form-group">
      <label for="price">Price:</label>
      <input type="number" id="price" name="price" step="0.01">
    </div>

    <div class="form-group">
      <label for="keyWords">Key Words:</label>
      <input type="text" id="keyWords" name="keyWords">
    </div>

    <div class="form-group">
      <label for="category">Category:</label>
      <input type="text" id="category" name="category" required>
    </div>

    <div class="form-group">
      <label for="stock">Stock:</label>
      <input type="number" id="stock" name="stock" min="0" value="0" required>
    </div>

    <button type="submit">Save Product</button>
    <p id="statusMessage"></p>
  </form>

  <script src="../JavaScript/Admin.js"></script>
</body>
</html>
