<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product — Green Thumb</title>
    <link rel="stylesheet" href="../Stylesheet/Product.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,500;0,600;1,400&family=Nunito:wght@300;400;500;600&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=shopping_cart" />
</head>

<body>


    <div class="page">
        <div id="navbar-placeholder"></div>

        <div class="product-card">
            <div class="product-image"></div>

            <div class="product-info">
                <h1 class="product-name"></h1>
                <div class="product-reviews"></div>
                <div class="product-price"></div>
                <p class="product-description"></p>

                <div class="add-to-cart">
                    <div class="qty-wrap">
                        <label for="item-quantity">Quantity:</label>
                        <input id="item-quantity" type="number" value="1" min="1" max="5">
                    </div>
                    <button class="quick-add-to-cart">Add to Cart</button>
                    <button class="like-button">♡</button>
                </div>
            </div>
        </div>
    </div>


    <script src="../JavaScript/navbar.js"></script>
    <script src="../JavaScript/Product.js"></script>
</body>

</html>
